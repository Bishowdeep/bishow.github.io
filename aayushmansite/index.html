<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Proposal ❤️</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 2;
}

h1 {
    color: #ff4d6d;
}

.buttons {
    margin-top: 20px;
    position: relative;
}

button {
    padding: 12px 20px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

#yesBtn {
    background-color: #28a745;
    color: white;
    margin-right: 10px;
}

#noBtn {
    background-color: #dc3545;
    color: white;
    position: absolute;
}

#loveNote {
    display: none;
    margin-top: 20px;
    font-size: 18px;
    color: #333;
}

/* Floating hearts */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(45deg);
    animation: floatUp 6s linear infinite;
    opacity: 0.7;
}

.heart::before,
.heart::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
}

.heart::before {
    top: -10px;
    left: 0;
}

.heart::after {
    left: -10px;
    top: 0;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh) scale(0.5) rotate(45deg);
        opacity: 0;
    }
    50% {
        opacity: 0.8;
    }
    100% {
        transform: translateY(-10vh) scale(1) rotate(45deg);
        opacity: 0;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>Will you be mine forever? ❤️</h1>
    <div class="buttons">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 💔</button>
    </div>
    <div id="loveNote">
        💌 From the moment I met you, my world changed.<br>
        You are my happiness, my peace, and my forever.<br>
        I promise to love you endlessly. ❤️
    </div>
</div>

<script>
const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');
const loveNote = document.getElementById('loveNote');

// MOBILE + DESKTOP: move button
function moveNoButton() {
    const x = Math.random() * 250 - 125;
    const y = Math.random() * 250 - 125;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

noBtn.addEventListener('mouseover', moveNoButton);
noBtn.addEventListener('click', moveNoButton);
noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    moveNoButton();
});

// YES click
yesBtn.addEventListener('click', () => {
    loveNote.style.display = 'block';
    document.querySelector('.buttons').style.display = 'none';
});

// Floating hearts generator
function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
